set -g set-clipboard on
set -g history-limit 50000 # 滚动历史5w行
set -g window-status-format ' #I:#W#F '
set -g mode-keys vi
set -g focus-events on # 让 nvim 等程序能收到 FocusGained/FocusLost 事件 (输入法自动切换依赖此项)

set -g cursor-style bar # 光标使用竖线,而不是默认的方块. 后者不方便复制

# 鼠标选中后释放鼠标时保持窗口, 不回到最底部
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 

# Ctrl+L(无需tmux prefix键) 原本是终端的 clear，这里扩展成连 scrollback 一起清
bind -n C-l send-keys C-l \; clear-history

# 当前窗口高亮样式（示例：白字蓝底粗体）
set -g window-status-current-format '#[fg=black,bg=yellow,bold] #I:#W#F #[default]'

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
set -g mouse on
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
 
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
 
# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'
#
set -g @resurrect-capture-pane-contents 'on'
 
# auto restore
set -g @continuum-restore 'on'
# 设置自动保存的时间间隔，默认是15分钟
# 下面意为改为60分钟，如果改成0则停止自动保存
# set -g @continuum-save-interval '60'
 
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
